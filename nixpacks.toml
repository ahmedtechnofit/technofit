[phases.setup]

nixPkgs = ['...', 'openssl', 'python3']

[phases.install]

cmds = ['bun install']

[phases.build]

# Set a dummy DATABASE_URL for build time (Prisma generate needs it)
env = { DATABASE_URL = 'postgresql://dummy:dummy@localhost:5432/dummy' }
cmds = ['npx prisma generate', 'bun run build']

[start]

cmd = 'npx prisma db push --accept-data-loss && next start -p $PORT'
